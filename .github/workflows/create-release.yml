name: Create Release
on:
  workflow_dispatch:

jobs:
  create-release:
    name: Create Github Release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: jdx/mise-action@v4
      - run: ./scripts/create-release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
