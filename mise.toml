[tools]
# Misc.
pulumi = "latest"
"github:MrLesk/Backlog.md" = "latest"
hk = "latest"
pkl = "latest"
java = "24"  # Needed for pkl language server

# Golang
go = "1.26"
gofumpt = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"github:golangci/golines" = "latest"
"github:securego/gosec" = "latest"
golangci-lint = "latest"

# Web
node = "24"
pnpm = "11"
oxlint = "latest"

[shell_alias]
backlog = "backlog-bun"

[tasks.dev-fe]
description = "Run Vite dev server (backend proxies to this)"
dir = "frontend"
run = "pnpm dev"

[tasks.dev-be]
description = "Run backend with Vite proxy (VITE_DEV_PROXY must be set)"
dir = "backend"
run = "go run ."
env.VITE_DEV_PROXY = "http://localhost:5173"

[tasks.dev]
description = "Run backend and frontend in parallel"
depends = ["dev-fe", "dev-be"]

[tasks.build-fe]
description = "Build frontend for production"
dir = "frontend"
run = "pnpm run build"

[tasks.build]
depends = ["build-fe"]
description = "Build Go backend binary"
dir = "backend"
env.CGO_ENABLED = "0"
run = "go build ."

[tasks.backlog-web]
run = "backlog-bun browser"

[tasks.bootstrap-preview]
description = "Preview Pulumi bootstrap stack changes"
dir = "deploy/bootstrap"
run = "pulumi preview"

[tasks.bootstrap-up]
description = "Apply Pulumi bootstrap stack"
dir = "deploy/bootstrap"
run = "pulumi up"
